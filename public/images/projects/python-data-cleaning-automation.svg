    <text x="72" y="108" font-family="Menlo, Consolas, monospace" font-size="14" fill="#0071e3">import pandas as pd</text><text x="72" y="134" font-family="Menlo, Consolas, monospace" font-size="14" fill="transparent"></text><text x="72" y="160" font-family="Menlo, Consolas, monospace" font-size="14" fill="#1a1a1a">def clean_dataset(df: pd.DataFrame) -> pd.DataFrame:</text><text x="72" y="186" font-family="Menlo, Consolas, monospace" font-size="14" fill="#1a9d4c">    df = df.drop_duplicates()</text><text x="72" y="212" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c7ddf7">    df['date'] = pd.to_datetime(df['date'], errors='coerce')</text><text x="72" y="238" font-family="Menlo, Consolas, monospace" font-size="14" fill="#0071e3">    df['category'] = df['category'].str.strip().str.title()</text><text x="72" y="264" font-family="Menlo, Consolas, monospace" font-size="14" fill="#8a8a8e">    df = df.dropna(subset=['id', 'date'])</text><text x="72" y="290" font-family="Menlo, Consolas, monospace" font-size="14" fill="#1a1a1a">    return df.reset_index(drop=True)</text><text x="72" y="316" font-family="Menlo, Consolas, monospace" font-size="14" fill="transparent"></text><text x="72" y="342" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c7ddf7">report = validate(df_clean)</text><text x="72" y="368" font-family="Menlo, Consolas, monospace" font-size="14" fill="#0071e3">print(f'Rows cleaned: {len(df_clean)} / {len(df_raw)}')</text>
