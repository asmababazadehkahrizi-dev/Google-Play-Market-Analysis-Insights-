<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
    
  <rect width="1200" height="750" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="56" fill="#fafafa"/>
  <line x1="0" y1="56" x2="1200" y2="56" stroke="#e5e5e5" stroke-width="1"/>
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="6" fill="#febc2e"/>
  <circle cx="68" cy="28" r="6" fill="#28c840"/>
  <text x="600" y="33" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#8a8a8e">SQL Business Intelligence Analysis</text>
  
    <rect x="40" y="80" width="1120" height="400" rx="14" fill="#0a0a0a"/>
    <circle cx="70" cy="104" r="5" fill="#ff5f57"/>
    <circle cx="88" cy="104" r="5" fill="#febc2e"/>
    <circle cx="106" cy="104" r="5" fill="#28c840"/>
    <text x="72" y="108" font-family="Menlo, Consolas, monospace" font-size="13" fill="#0071e3">WITH monthly_sales AS (</text><text x="72" y="130" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a1a1a">  SELECT</text><text x="72" y="152" font-family="Menlo, Consolas, monospace" font-size="13" fill="#8a8a8e">    DATE_TRUNC('month', order_date) AS month,</text><text x="72" y="174" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a9d4c">    region,</text><text x="72" y="196" font-family="Menlo, Consolas, monospace" font-size="13" fill="#0071e3">    SUM(revenue) AS total_revenue</text><text x="72" y="218" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a1a1a">  FROM sales.orders</text><text x="72" y="240" font-family="Menlo, Consolas, monospace" font-size="13" fill="#8a8a8e">  GROUP BY 1, 2</text><text x="72" y="262" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a9d4c">)</text><text x="72" y="284" font-family="Menlo, Consolas, monospace" font-size="13" fill="#0071e3">SELECT</text><text x="72" y="306" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a1a1a">  month,</text><text x="72" y="328" font-family="Menlo, Consolas, monospace" font-size="13" fill="#8a8a8e">  region,</text><text x="72" y="350" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a9d4c">  total_revenue,</text><text x="72" y="372" font-family="Menlo, Consolas, monospace" font-size="13" fill="#0071e3">  SUM(total_revenue) OVER (</text><text x="72" y="394" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a1a1a">    PARTITION BY region ORDER BY month</text><text x="72" y="416" font-family="Menlo, Consolas, monospace" font-size="13" fill="#8a8a8e">  ) AS running_total</text><text x="72" y="438" font-family="Menlo, Consolas, monospace" font-size="13" fill="#1a9d4c">FROM monthly_sales</text><text x="72" y="460" font-family="Menlo, Consolas, monospace" font-size="13" fill="#0071e3">ORDER BY region, month;</text>
    <rect x="40" y="500" width="1120" height="204" rx="14" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
    <text x="64" y="534" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#0a0a0a">Query results</text>
    <rect x="64" y="550" width="1072" height="170" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/><rect x="64" y="550" width="1072" height="34" fill="#fafafa"/><line x1="64" y1="584" x2="1136" y2="584" stroke="#e5e5e5"/><rect x="84" y="596" width="70" height="10" rx="3" fill="#e5e5e5"/><rect x="970.4363991769548" y="594" width="145.6" height="14" rx="4" fill="#0071e3" opacity="0.55"/><line x1="64" y1="618" x2="1136" y2="618" stroke="#e5e5e5"/><rect x="84" y="630" width="70" height="10" rx="3" fill="#e5e5e5"/><rect x="1048.0610459533607" y="628" width="67.9" height="14" rx="4" fill="#0071e3" opacity="0.55"/><line x1="64" y1="652" x2="1136" y2="652" stroke="#e5e5e5"/><rect x="84" y="664" width="70" height="10" rx="3" fill="#e5e5e5"/><rect x="774.9007133058985" y="662" width="341.1" height="14" rx="4" fill="#0071e3" opacity="0.55"/><line x1="64" y1="686" x2="1136" y2="686" stroke="#e5e5e5"/><rect x="84" y="698" width="70" height="10" rx="3" fill="#e5e5e5"/><rect x="965.0467592592593" y="696" width="151.0" height="14" rx="4" fill="#0071e3" opacity="0.55"/>
